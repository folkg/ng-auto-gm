name: Common Build Steps
on:
  workflow_call:
    secrets:
      NG_APP_FIREBASE_API_KEY:
        required: true
      NG_APP_FIREBASE_AUTH_DOMAIN:
        required: true
      NG_APP_FIREBASE_PROJECT_ID:
        required: true
      NG_APP_FIREBASE_STORAGE_BUCKET:
        required: true
      NG_APP_FIREBASE_MESSAGING_SENDER_ID:
        required: true
      NG_APP_FIREBASE_APP_ID:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Biome CLI
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci

      - name: Setup Bun CLI
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chrome browser
        run: bunx playwright install chromium

      - name: Run tests
        run: bun run test:ci

      - name: Build
        run: bun run build
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.NG_APP_FIREBASE_API_KEY }}
          NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID }}
          NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.NG_APP_FIREBASE_APP_ID }}

      - name: Upload build output
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: dist/auto-gm
